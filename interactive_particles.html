<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stardust Gesture Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #webcam { position: absolute; bottom: 10px; right: 10px; width: 160px; opacity: 0.5; border-radius: 10px; transform: scaleX(-1); }
        .hint { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.6); font-family: monospace; pointer-events: none; line-height: 1.8; }
        #dive-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: monospace;
            font-size: 2em;
            letter-spacing: 0.3em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        #mode-label {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 210, 120, 0.8);
            font-family: monospace;
            font-size: 1em;
            letter-spacing: 0.2em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="hint">
    [SYSTEM ACTIVE]<br>
    ✦ PINCH: AGITATE PARTICLES<br>
    ✦ RAISE HAND: MORPH SPHERE → HEART<br>
    ✦ FIST: MORPH → ♄ SATURN<br>
    ✦ SPREAD ARMS: FLY INTO STARDUST
</div>
<div id="dive-label">✦ DIVING ✦</div>
<div id="mode-label">♄ SATURN MODE</div>
<video id="webcam" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, points, material;
const nPoints = 12000;

// Camera state
let targetCamZ = 30;
let baseCamZ = 30;
let isDiving = false;

// Saturn state — use velocity-based smoothing for buttery motion
let saturnTarget = 0;
let saturnVelocity = 0;

// Fist detection hysteresis to avoid flickering
let fistFrames = 0;
let noFistFrames = 0;
const FIST_ON_THRESHOLD  = 6;  // frames of fist before activating
const FIST_OFF_THRESHOLD = 10; // frames of no-fist before deactivating
let saturnActive = false;

// Saturn ring tilt — smoothly reveals rings when saturn activates
let ringTiltCurrent = 0;
let ringTiltTarget  = 0;

function generateSaturnPositions(nPoints) {
    const pos = new Float32Array(nPoints * 3);
    const nPlanet = Math.floor(nPoints * 0.55);
    const nRings  = nPoints - nPlanet;

    for (let i = 0; i < nPlanet; i++) {
        const r = 5.5;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * 0.88 * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
    }

    for (let i = 0; i < nRings; i++) {
        const idx = nPlanet + i;
        let radius;
        const band = Math.random();
        if (band < 0.15) {
            radius = 7.0 + Math.random() * 1.0;
        } else if (band < 0.55) {
            radius = 8.2 + Math.random() * 1.5;
        } else if (band < 0.60) {
            radius = 9.75 + Math.random() * 0.2;
        } else {
            radius = 9.9 + Math.random() * 2.8;
        }
        const angle = Math.random() * Math.PI * 2;
        const tilt  = (Math.random() - 0.5) * 0.08;
        pos[idx*3]   = radius * Math.cos(angle);
        pos[idx*3+1] = tilt;
        pos[idx*3+2] = radius * Math.sin(angle);
    }

    return pos;
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 30;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    const posSphere = new Float32Array(nPoints * 3);
    const posHeart  = new Float32Array(nPoints * 3);
    const posSaturn = generateSaturnPositions(nPoints);
    const randomSizes = new Float32Array(nPoints);

    for (let i = 0; i < nPoints; i++) {
        const r = 10;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        posSphere[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        posSphere[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        posSphere[i*3+2] = r * Math.cos(phi);

        const t = Math.random() * Math.PI * 2;
        const hS = 0.6;
        posHeart[i*3]   = hS * (16 * Math.pow(Math.sin(t), 3));
        posHeart[i*3+1] = hS * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        posHeart[i*3+2] = (Math.random() - 0.5) * 5;

        randomSizes[i] = Math.random();
    }

    geo.setAttribute('position',  new THREE.BufferAttribute(posSphere,  3));
    geo.setAttribute('targetPos', new THREE.BufferAttribute(posHeart,   3));
    geo.setAttribute('saturnPos', new THREE.BufferAttribute(posSaturn,  3));
    geo.setAttribute('aSize',     new THREE.BufferAttribute(randomSizes,1));

    material = new THREE.ShaderMaterial({
        uniforms: {
            uTime:       { value: 0 },
            uMorph:      { value: 0 },
            uPinch:      { value: 0 },
            uDive:       { value: 0 },
            uSaturn:     { value: 0 },
            uRingTilt:   { value: 0 },  // 0=face-on, 1=tilted to reveal rings
        },
        vertexShader: `
            attribute vec3 targetPos;
            attribute vec3 saturnPos;
            attribute float aSize;
            uniform float uTime;
            uniform float uMorph;
            uniform float uPinch;
            uniform float uDive;
            uniform float uSaturn;
            uniform float uRingTilt;
            varying vec3 vColor;
            varying float vOpacity;

            void main() {
                vec3 heartSphere = mix(position, targetPos, uMorph);

                // Apply ring tilt: rotate saturnPos around X axis so rings face camera
                float tiltAngle = uRingTilt * 0.52; // ~30deg max tilt
                float cosT = cos(tiltAngle);
                float sinT = sin(tiltAngle);
                vec3 sp = saturnPos;
                vec3 saturnTilted = vec3(
                    sp.x,
                    sp.y * cosT - sp.z * sinT,
                    sp.y * sinT + sp.z * cosT
                );

                vec3 pos = mix(heartSphere, saturnTilted, uSaturn);

                float noise = sin(uTime * 2.0 + pos.x * 0.5) * uPinch * 2.0;
                pos += noise;

                pos.z += uDive * (aSize - 0.5) * 60.0;
                pos.x += uDive * sin(uTime + aSize * 30.0) * 8.0;
                pos.y += uDive * cos(uTime + aSize * 20.0) * 8.0;

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_PointSize = (20.0 + aSize * 40.0) * (20.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;

                vec3 baseColor    = mix(vec3(0.2, 0.8, 1.0), vec3(1.0, 0.3, 0.5), uMorph);
                vec3 saturnColor  = mix(vec3(0.95, 0.82, 0.55), vec3(0.75, 0.60, 0.40), aSize);
                vec3 blended      = mix(baseColor, saturnColor, uSaturn);
                vColor = mix(blended, vec3(1.0, 0.95, 0.8), uDive);
                vOpacity = 0.5 + aSize * 0.5 + uDive * 0.5;
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            varying float vOpacity;
            void main() {
                float d = distance(gl_PointCoord, vec2(0.5));
                float strength = 0.05 / d;
                strength = pow(strength, 2.0);
                if (d > 0.5) discard;
                gl_FragColor = vec4(vColor * strength, vOpacity * (1.0 - d*2.0));
            }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    points = new THREE.Points(geo, material);
    scene.add(points);
}

function isFist(hand) {
    const tips = [8, 12, 16, 20];
    const pips = [6, 10, 14, 18];
    let curled = 0;
    for (let i = 0; i < tips.length; i++) {
        if (hand[tips[i]].y > hand[pips[i]].y) curled++;
    }
    return curled >= 3;
}

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });

const diveLabel  = document.getElementById('dive-label');
const modeLabel  = document.getElementById('mode-label');

hands.onResults((res) => {
    const allHands = res.multiHandLandmarks || [];

    if (allHands.length >= 2) {
        const wrist0 = allHands[0][0];
        const wrist1 = allHands[1][0];
        const spreadDist = Math.hypot(wrist0.x - wrist1.x, wrist0.y - wrist1.y);

        if (spreadDist > 0.45) {
            isDiving = true;
            targetCamZ = -5;
            diveLabel.style.opacity = '1';
        } else {
            isDiving = false;
            targetCamZ = baseCamZ;
            diveLabel.style.opacity = '0';
        }
    } else {
        isDiving = false;
        targetCamZ = baseCamZ;
        diveLabel.style.opacity = '0';
    }

    if (allHands.length > 0) {
        const hand = allHands[0];

        // Hysteresis-gated fist detection to prevent flicker
        if (isFist(hand)) {
            fistFrames++;
            noFistFrames = 0;
            if (fistFrames >= FIST_ON_THRESHOLD) {
                saturnActive = true;
            }
        } else {
            noFistFrames++;
            fistFrames = 0;
            if (noFistFrames >= FIST_OFF_THRESHOLD) {
                saturnActive = false;
            }
        }

        saturnTarget = saturnActive ? 1 : 0;
        ringTiltTarget = saturnActive ? 1 : 0;
        modeLabel.style.opacity = saturnActive ? '1' : '0';

        const targetMorph = 1.0 - Math.min(Math.max(hand[0].y * 1.5 - 0.2, 0), 1);
        material.uniforms.uMorph.value += (targetMorph - material.uniforms.uMorph.value) * 0.1;

        const dist = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
        material.uniforms.uPinch.value = dist < 0.06 ? 1.5 : 0.2;

        if (!isDiving) {
            points.rotation.y = (hand[0].x - 0.5) * 3;
            points.rotation.x = (hand[0].y - 0.5) * 3;
        }
    } else {
        fistFrames = 0;
        noFistFrames++;
        if (noFistFrames >= FIST_OFF_THRESHOLD) {
            saturnActive = false;
        }
        saturnTarget = saturnActive ? 1 : 0;
        ringTiltTarget = saturnActive ? 1 : 0;
        modeLabel.style.opacity = '0';
    }
});

const cam = new Camera(document.getElementById('webcam'), {
    onFrame: async () => { await hands.send({image: document.getElementById('webcam')}); },
    width: 640, height: 480
});

function smoothDamp(current, target, velocityRef, smoothTime, dt) {
    // Spring-damper smoothing (critically damped)
    const omega = 2.0 / smoothTime;
    const x = omega * dt;
    const exp = 1.0 / (1.0 + x + 0.48 * x * x + 0.235 * x * x * x);
    const change = current - target;
    const temp = (velocityRef.v + omega * change) * dt;
    velocityRef.v = (velocityRef.v - omega * temp) * exp;
    return target + (change + temp) * exp;
}

const saturnVelocityRef = { v: 0 };
const ringTiltVelocityRef = { v: 0 };

function animate() {
    requestAnimationFrame(animate);
    const dt = 1 / 60;

    material.uniforms.uTime.value += 0.01;

    // Smooth camera travel
    camera.position.z += (targetCamZ - camera.position.z) * 0.06;

    const diveProgress = Math.max(0, Math.min(1, (baseCamZ - camera.position.z) / (baseCamZ - (-5))));
    material.uniforms.uDive.value = diveProgress;

    // Spring-damped saturn morphing — smooth_time=0.9s gives a silky transition
    material.uniforms.uSaturn.value = smoothDamp(
        material.uniforms.uSaturn.value,
        saturnTarget,
        saturnVelocityRef,
        0.9,
        dt
    );

    // Smooth ring tilt reveal
    ringTiltCurrent = smoothDamp(
        ringTiltCurrent,
        ringTiltTarget,
        ringTiltVelocityRef,
        1.1,
        dt
    );
    material.uniforms.uRingTilt.value = ringTiltCurrent;

    if (isDiving) {
        points.rotation.y += 0.015;
        camera.fov = 70 + diveProgress * 40;
    } else {
        camera.fov += (70 - camera.fov) * 0.05;
    }

    // Gentle auto-rotate in saturn mode — smoothly fade in rotation speed
    if (material.uniforms.uSaturn.value > 0.01 && !isDiving) {
        points.rotation.y += 0.003 * material.uniforms.uSaturn.value;
    }

    camera.updateProjectionMatrix();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
cam.start();
animate();
</script>
</body>
</html>
